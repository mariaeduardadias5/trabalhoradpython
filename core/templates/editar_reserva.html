
{% block content %}
<h2>Editar Reserva</h2>

<form method="post">
    {% csrf_token %}

    <label for="sala">Sala:</label>
    <select name="sala" id="sala" required>
        {% for sala in salas %}
            <option value="{{ sala.id }}" {% if reserva.sala.id == sala.id %}selected{% endif %}>
                {{ sala.nome }} - Capacidade: {{ sala.capacidade }}
            </option>
        {% endfor %}
    </select>
    <br><br>

    <label for="data">Data:</label>
    <input type="date" name="data" id="data" value="{{ reserva.data }}" required>
    <br><br>

    <label for="hora_inicio">Hora Início:</label>
    <input type="time" name="hora_inicio" id="hora_inicio" value="{{ reserva.hora_inicio }}" required>
    <br><br>

    <label for="hora_fim">Hora Fim:</label>
    <input type="time" name="hora_fim" id="hora_fim" value="{{ reserva.hora_fim }}" required>
    <br><br>

    <label>Itens:</label><br>
    {% for item in itens %}
        <input type="checkbox" name="itens" value="{{ item.id }}"
            {% if item in reserva.itens.all %}checked{% endif %}>
        {{ item.nome }}<br>
    {% endfor %}
    <br>

    <button type="submit">Atualizar Reserva</button>
</form>
{% endblock %}
