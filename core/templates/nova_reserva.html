{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Reserva - UniSalas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f7f6fb;
        }

        .navbar-custom {
            background-color:#490E67;
        }

        .navbar-custom a {
            color: #fff !important;
        }

        .card-form {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            background-color: #fff;
        }

        .btn-salvar {
            background-color: #490E67;
            color: #fff;
        }

        .btn-salvar:hover {
            background-color: #380a4e;
            color: #fff;
        }

        .btn-minhas {
            background-color:#8966cf;
            color: #fff;
        }

        .btn-minhas:hover {
           background-color: #6e52a5;
           color: #fff;
        }

      
    nav .btn-home {
    background-color: #ffffff !important;
    color: #000000 !important; 
    border: 1px solid #ddd !important;
}

    nav .btn-home:hover {
    background-color: #b9b8b9 !important;
    color: #000000 !important;
}

    
        .form-check-input-personalizado:checked {
            background-color: #6f42c1; 
            border-color: #6f42c1;  
        }

        .form-check-input-personalizado:hover {
            border-color: #6f42c1;     
        }

        .form-check-input-personalizado:checked[type=checkbox] {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3e%3cpath fill='none' stroke='%23fff' stroke-linecap='round' stroke-linejoin='round' stroke-width='3' d='m6 10 3 3 6-6'/%3e%3c/svg%3e");
        }

        .form-check-input-personalizado:focus {
            box-shadow: 0 0 0 0.25rem rgba(111, 66, 193, 0.25);
            border-color: #6f42c1;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4 py-3 mb-4">
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">UniSalas</a>

    <div class="ms-auto">
        <a href="{% url 'home' %}" class="btn btn-home btn-sm me-2">Home</a>
        <a href="{% url 'minhas_reservas' %}" class="btn btn-minhas btn-sm me-2">Minhas Reservas</a> 
    </div>
</nav>

<div class="container d-flex justify-content-center mb-5">
    <div class="card card-form p-4" style="width: 500px;">
        <h3 class="text-center mb-3">Nova Reserva</h3>

        {% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nome do Evento</label>
                <input type="text" name="nome_evento" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Sala</label>
                <select name="sala" class="form-control" required>
                    {% for sala in salas %}
                        <option value="{{ sala.id }}">{{ sala.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Data</label>
                <input type="date" name="data" class="form-control" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Hora início</label>
                    <input type="time" name="hora_inicio" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Hora fim</label>
                    <input type="time" name="hora_fim" class="form-control" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label"><strong>Itens:</strong></label>
                <div class="d-flex flex-wrap" style="gap: 10px;">
                    {% for item in itens %}
                    <div class="form-check">
                        <input class="form-check-input form-check-input-personalizado" type="checkbox" name="itens" value="{{ item.id }}" id="item{{ item.id }}">
                        <label class="form-check-label" for="item{{ item.id }}">
                            {{ item.nome }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="btn btn-salvar w-100">Salvar Reserva</button>
        </form>
    </div>
</div> </body>
</html>
