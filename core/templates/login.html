{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
       body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top left, #6f42c1, #4e2a84);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card-login {
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.95); /* Quase branco, mas suave */
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(5px);
    transition: all 0.4s ease;
}

.form-control {
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 12px 15px;
    transition: all 0.3s ease;
}

.form-control:focus {
    border-color: #6f42c1;
    box-shadow: 0 0 0 4px rgba(111, 66, 193, 0.1);
    transform: translateY(-2px);
}

.btn-login {
    background: linear-gradient(90deg, #6f42c1, #8553e8);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-weight: 600;
    color: white;
    transition: all 0.3s ease;
    
}

.btn-login:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 20px rgba(111, 66, 193, 0.3);
    color: white;
}

.link {
    color: #6f42c1;
    position: relative;
    font-weight: 500;
}

.link::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -2px;
    left: 0;
    background-color: #6f42c1;
    transition: width 0.3s ease;
}

.link:hover::after {
    width: 100%;
}
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card card-login p-4" style="width: 350px;">
    <h3 class="text-center mb-3">Login</h3>


 {% if form.errors %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        ❌ Email ou senha inválidos.
    </div>
{% endif %}



    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
        <label>E-mail</label>
        <input type="email" name="username" class="form-control">
    </div>

    <div class="mb-3">
        <label>Senha</label>
        <input type="password" name="password" class="form-control">
    </div>

    <button type="submit" class="btn btn-login w-100">Entrar</button>
    </form>

    <div class="text-center mt-3">
        <small>Não tem conta? <a href="{% url 'signup' %}" class="link">Cadastrar</a></small>
    </div>
</div>

</body>
</html>
